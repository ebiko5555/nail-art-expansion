<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nail Editor — Art Expansion 技術検証デモ</title>
<style>
  :root {
    --bg: #faf7f4;
    --ink: #3d3d3d;
    --accent: #c9a0a0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
    height: 100dvh;
    transition: background 1.2s ease;
  }
  body.art-mode { background: #14161a; color: #e8e4dd; }

  #stage {
    position: relative;
    width: 100%;
    height: 100dvh;
  }
  #video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    transition: opacity .3s;
  }
  #veil {
    position: absolute; inset: 0;
    background: #0b0d10;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }
  #three-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 16px 20px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none;
  }
  #hud h1 {
    font-size: 15px; font-weight: normal; letter-spacing: .12em;
    text-shadow: 0 1px 4px rgba(0,0,0,.25);
    color: #fff;
  }
  #status {
    font-size: 12px; letter-spacing: .08em;
    color: #fff; opacity: .85;
    text-shadow: 0 1px 4px rgba(0,0,0,.3);
  }

  #panel {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 14px 18px calc(18px + env(safe-area-inset-bottom));
    background: rgba(255,255,255,.72);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid rgba(0,0,0,.06);
    transition: background 1.2s ease, border-color 1.2s ease;
  }
  body.art-mode #panel {
    background: rgba(18,20,26,.55);
    border-top: 1px solid rgba(255,255,255,.12);
  }
  .slider-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px;
  }
  #art-picker {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
    margin-bottom: 14px;
  }
  .art-choice {
    font-family: inherit; font-size: 11px; letter-spacing: .08em;
    padding: 9px 6px; border-radius: 999px;
    border: 1px solid rgba(61,61,61,.18);
    background: rgba(255,255,255,.32); color: inherit;
    cursor: pointer; transition: background .35s, border-color .35s, box-shadow .35s;
  }
  .art-choice[aria-pressed="true"] {
    background: rgba(255,255,255,.68);
    border-color: rgba(117,172,178,.75);
    box-shadow: 0 0 18px rgba(118,190,196,.18);
  }
  body.art-mode .art-choice { border-color: rgba(255,255,255,.18); }
  body.art-mode .art-choice[aria-pressed="true"] {
    background: rgba(190,226,225,.12); border-color: rgba(190,226,225,.62);
  }
  .slider-row label {
    width: 7.5em; font-size: 12px; letter-spacing: .05em;
    flex-shrink: 0;
  }
  .slider-row output {
    width: 3em; font-size: 11px; text-align: right; font-variant-numeric: tabular-nums;
  }
  input[type=range] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 3px; border-radius: 2px;
    background: linear-gradient(90deg, #d9b8a6, #9fd0d8);
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 22px; height: 22px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ffffff, #cfe9ec 60%, #8fb8c4);
    border: 1px solid rgba(255,255,255,.8);
    box-shadow: 0 1px 6px rgba(80,140,160,.45);
    cursor: pointer;
  }
  #hint {
    font-size: 11px; opacity: .6; letter-spacing: .05em; text-align: center;
  }
  .mode-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin: 4px 0 10px;
  }
  .field label { display: block; font-size: 10px; opacity: .65; margin-bottom: 4px; }
  .field select {
    width: 100%; min-height: 34px; padding: 5px 9px;
    border: 1px solid rgba(100,100,100,.25); border-radius: 8px;
    background: rgba(255,255,255,.65); color: inherit; font-family: inherit;
  }
  body.art-mode .field select { background: rgba(20,22,28,.7); }
  .advanced { margin: 2px 0 10px; font-size: 11px; }
  .advanced summary { cursor: pointer; opacity: .72; letter-spacing: .06em; }
  .advanced-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px;
    margin-top: 9px;
  }
  .advanced-grid .slider-row { display: block; margin: 0; }
  .advanced-grid .slider-row label { width: auto; margin-bottom: 3px; }
  .advanced-grid .slider-row output { float: right; width: auto; }
  .check-row { display: flex; align-items: center; gap: 7px; min-height: 34px; font-size: 11px; }
  #bone-list {
    grid-column: 1 / -1; max-height: 58px; overflow: auto;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 9px; line-height: 1.5; opacity: .55;
  }
  @media (max-height: 720px) {
    #panel { max-height: 46dvh; overflow-y: auto; }
    .slider-row { margin-bottom: 7px; }
  }
  @media (max-width: 520px) {
    #hud { align-items: flex-start; padding: 14px 18px; }
    #hud h1 { width: 54%; font-size: 12px; line-height: 1.45; }
    #hud > div { width: 44%; justify-content: flex-end; }
    #status { font-size: 10px; line-height: 1.45; text-align: right; }
    #flip-btn { padding: 5px 9px !important; font-size: 10px !important; }
  }
  #start-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px;
    background: var(--bg);
    z-index: 10;
  }
  #start-overlay p { font-size: 13px; letter-spacing: .1em; opacity: .7; max-width: 26em; text-align: center; line-height: 1.9; padding: 0 2em;}
  #start-btn {
    font-family: inherit;
    font-size: 15px; letter-spacing: .2em;
    padding: 14px 46px;
    border: 1px solid var(--accent);
    border-radius: 999px;
    background: #fff; color: var(--ink);
    cursor: pointer;
    transition: all .3s;
  }
  #start-btn:hover { background: var(--accent); color: #fff; }
</style>
</head>
<body>
<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <div id="veil"></div>
  <canvas id="three-canvas"></canvas>

  <div id="hud">
    <h1>ART EXPANSION — 技術検証</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <div id="status">起動待ち</div>
      <button id="flip-btn" style="display:none;pointer-events:auto;font-family:inherit;font-size:12px;letter-spacing:.08em;padding:6px 14px;border:1px solid rgba(255,255,255,.6);border-radius:999px;background:rgba(0,0,0,.25);color:#fff;cursor:pointer">カメラ切替</button>
    </div>
  </div>

  <div id="panel">
    <div id="art-picker" aria-label="アートモデル">
      <button class="art-choice" data-art="crystal" aria-pressed="true">水晶</button>
      <button class="art-choice" data-art="trace" aria-pressed="false">痕跡</button>
    </div>
    <div class="slider-row">
      <label for="s-fusion">融合比率</label>
      <input type="range" id="s-fusion" min="0" max="100" value="60">
      <output id="o-fusion">60%</output>
    </div>
    <div class="slider-row">
      <label for="s-trans">光の透過率</label>
      <input type="range" id="s-trans" min="0" max="100" value="70">
      <output id="o-trans">70%</output>
    </div>
    <div class="slider-row">
      <label for="s-glow">内部光源の輝度</label>
      <input type="range" id="s-glow" min="0" max="100" value="40">
      <output id="o-glow">40%</output>
    </div>
    <div class="mode-row">
      <div class="field">
        <label for="display-mode">表示モード</label>
        <select id="display-mode">
          <option value="overlay">カメラ＋3D手モデル</option>
          <option value="camera">カメラ映像のみ</option>
          <option value="model">3D手モデルのみ</option>
          <option value="landmarks">MediaPipeランドマーク</option>
          <option value="skeleton">骨表示デバッグ</option>
        </select>
      </div>
      <label class="check-row"><input type="checkbox" id="mirror-toggle" checked> 鏡像表示</label>
    </div>
    <details class="advanced">
      <summary>位置・追従の微調整</summary>
      <div class="advanced-grid">
        <div class="slider-row"><label for="s-model-scale">大きさ <output id="o-model-scale">100%</output></label><input type="range" id="s-model-scale" min="50" max="160" value="100"></div>
        <div class="slider-row"><label for="s-model-opacity">透明度 <output id="o-model-opacity">90%</output></label><input type="range" id="s-model-opacity" min="10" max="100" value="90"></div>
        <div class="slider-row"><label for="s-offset-x">左右位置 <output id="o-offset-x">0</output></label><input type="range" id="s-offset-x" min="-20" max="20" value="0"></div>
        <div class="slider-row"><label for="s-offset-y">上下位置 <output id="o-offset-y">0</output></label><input type="range" id="s-offset-y" min="-20" max="20" value="0"></div>
        <div class="slider-row"><label for="s-depth">奥行き <output id="o-depth">0</output></label><input type="range" id="s-depth" min="-100" max="100" value="0"></div>
        <div class="slider-row"><label for="s-smoothing">平滑化 <output id="o-smoothing">55%</output></label><input type="range" id="s-smoothing" min="0" max="95" value="55"></div>
        <div class="slider-row"><label for="s-curl">指の曲がり <output id="o-curl">100%</output></label><input type="range" id="s-curl" min="40" max="120" value="100"></div>
        <div id="bone-list">骨モデルを読み込み中…</div>
      </div>
    </details>
    <div id="hint">カメラに手をかざすと、水晶の手が追従します</div>
  </div>

  <div id="start-overlay">
    <p>Nail Editor with Art Expansion<br>Step 1 技術検証：手のトラッキング × 3Dアート追従</p>
    <button id="start-btn">はじめる</button>
    <p style="font-size:11px">カメラの使用許可を求められたら「許可」を選んでください</p>
    <button id="demo-btn" style="font-family:inherit;font-size:12px;letter-spacing:.1em;padding:8px 24px;border:1px solid #ccc;border-radius:999px;background:transparent;color:inherit;cursor:pointer;opacity:.7">カメラなしでデモを見る</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
// ---------- 基本セットアップ ----------
const video = document.getElementById('video');
const veil = document.getElementById('veil');
const statusEl = document.getElementById('status');
const canvas = document.getElementById('three-canvas');
const displayMode = document.getElementById('display-mode');
const mirrorToggle = document.getElementById('mirror-toggle');
const modelScaleControl = document.getElementById('s-model-scale');
const modelOpacityControl = document.getElementById('s-model-opacity');
const offsetXControl = document.getElementById('s-offset-x');
const offsetYControl = document.getElementById('s-offset-y');
const depthControl = document.getElementById('s-depth');
const smoothingControl = document.getElementById('s-smoothing');
const curlControl = document.getElementById('s-curl');

const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
const scene = new THREE.Scene();
// 正射影カメラ：画面座標(0..1)をそのまま使う
const camera = new THREE.OrthographicCamera(0, 1, 0, 1, -10, 10);
camera.position.z = 5;

const ambient = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambient);
const key = new THREE.DirectionalLight(0xfff4e0, 1.2);
key.position.set(0.3, -0.5, 2);
scene.add(key);
const rim = new THREE.PointLight(0x9fd0ff, 1.0);
rim.position.set(0.8, 0.2, 1.5);
scene.add(rim);

function resize() {
  renderer.setSize(innerWidth, innerHeight, false);
}
addEventListener('resize', resize);
resize();

// ---------- 水晶ハンドモデル（21関節に追従するプロシージャルモデル） ----------
// BlenderのGLBが用意できたら、この部分をGLTFLoaderでの読み込みに差し替える
const crystalMat = new THREE.MeshPhysicalMaterial({
  color: 0xbfe3e8,
  metalness: 0.05,
  roughness: 0.12,
  transmission: 0.7,       // 光の透過率スライダーが操作
  thickness: 0.6,
  ior: 1.5,
  emissive: 0x66d0cc,      // 内部光源スライダーが操作
  emissiveIntensity: 0.4,
  transparent: true,
  opacity: 0.9,            // 融合比率スライダーが操作
  flatShading: true,
});

const handGroup = new THREE.Group();
scene.add(handGroup);

// 関節：多面体（水晶片）
const joints = [];
for (let i = 0; i < 21; i++) {
  const isTip = [4, 8, 12, 16, 20].includes(i);
  const geo = new THREE.IcosahedronGeometry(isTip ? 0.016 : 0.012, 0);
  const m = new THREE.Mesh(geo, crystalMat);
  m.rotation.set(Math.random() * 3, Math.random() * 3, Math.random() * 3);
  handGroup.add(m);
  joints.push(m);
}
// 骨：関節をつなぐ結晶柱
const BONES = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],
  [0,17],
];
const bones = BONES.map(() => {
  const geo = new THREE.CylinderGeometry(0.006, 0.009, 1, 6);
  const m = new THREE.Mesh(geo, crystalMat);
  handGroup.add(m);
  return m;
});

// 結晶ネイル：爪先に伸びる水晶（このアプリの主役）
const nailMat = new THREE.MeshPhysicalMaterial({
  color: 0xf3cfe0,
  metalness: 0.0,
  roughness: 0.08,
  transmission: 0.8,
  thickness: 0.4,
  ior: 1.6,
  emissive: 0xff9ec7,
  emissiveIntensity: 0.6,
  transparent: true,
  opacity: 0.95,
  flatShading: true,
});
const NAIL_SEGS = [[3,4],[7,8],[11,12],[15,16],[19,20]]; // [第一関節, 指先]
const nails = NAIL_SEGS.map(() => {
  const geo = new THREE.ConeGeometry(0.009, 0.05, 6);
  geo.translate(0, 0.025, 0); // 根元を原点に
  const m = new THREE.Mesh(geo, nailMat);
  handGroup.add(m);
  return m;
});
handGroup.visible = false;

// ---------- アートプリセット ----------
// 造形を切り替える前段階として、同じ手追跡に異なる物質感を割り当てる。
const ART_PRESETS = {
  crystal: {
    label: '水晶', color: 0xbfe3e8, nail: 0xf3cfe0, emissive: 0x66d0cc,
    roughness: 0.12, transmission: 0.7, wireframe: false,
  },
  trace: {
    label: '痕跡', color: 0xe7ddd0, nail: 0xffd6c9, emissive: 0xd7a889,
    roughness: 0.72, transmission: 0.05, wireframe: true,
  },
};
let activeArt = 'crystal';

function selectArt(name) {
  const preset = ART_PRESETS[name];
  if (!preset) return;
  activeArt = name;
  crystalMat.color.setHex(preset.color);
  crystalMat.emissive.setHex(preset.emissive);
  crystalMat.wireframe = preset.wireframe;
  nailMat.color.setHex(preset.nail);
  nailMat.emissive.setHex(preset.emissive);
  nailMat.wireframe = preset.wireframe;
  glbMats.forEach(material => {
    material.color?.setHex(material.userData.isNail ? preset.nail : preset.color);
    material.emissive?.setHex(preset.emissive);
    material.wireframe = preset.wireframe;
    material.needsUpdate = true;
  });
  document.querySelectorAll('.art-choice').forEach(button => {
    button.setAttribute('aria-pressed', button.dataset.art === name ? 'true' : 'false');
  });
  revealStart = performance.now();
  applySliders();
  document.getElementById('hint').textContent = `${preset.label}の手：指先から物質が満ちていきます`;
}

document.querySelectorAll('.art-choice').forEach(button => {
  button.addEventListener('click', () => selectArt(button.dataset.art));
});

// 出現演出：指先(seg=4)から手首(seg=0)へ結晶が満ちていく
let revealStart = 0;
const REVEAL_SEG = idx => idx === 0 ? 4 : 4 - (((idx - 1) % 4)); // 各関節の遅延段階（指先=0段）
function revealFactor(seg, now) {
  const t = (now - revealStart) / 900;             // 全体0.9秒
  return THREE.MathUtils.clamp((t - seg * 0.12) / 0.35, 0, 1);
}

const _v1 = new THREE.Vector3(), _v2 = new THREE.Vector3(), _mid = new THREE.Vector3();
const _up = new THREE.Vector3(0, 1, 0), _dir = new THREE.Vector3(), _q = new THREE.Quaternion();

// スムージング用の前フレーム座標
const smoothed = Array.from({ length: 21 }, () => new THREE.Vector3());
let hasPose = false;

function updateHand(landmarks) {
  // 高いほど安定するが遅れる。UIの「平滑化」を追従率へ変換する。
  const SMOOTH = 1 - (smoothingControl.value / 100) * 0.88;
  const now = performance.now();
  if (!hasPose) revealStart = now; // 手が現れた瞬間から出現演出
  for (let i = 0; i < 21; i++) {
    const lm = landmarks[i];
    // 内側カメラ（鏡像表示）の時だけxを反転して画面に合わせる
    _v1.set(mirrored ? 1 - lm.x : lm.x, lm.y, -lm.z * 0.5);
    if (!hasPose) smoothed[i].copy(_v1);
    else smoothed[i].lerp(_v1, SMOOTH);
    joints[i].position.copy(smoothed[i]);
  }
  hasPose = true;
  // 手の大きさで関節スケールを調整（遠近感）
  const scaleRef = smoothed[0].distanceTo(smoothed[9]); // 手首→中指付け根
  const s = THREE.MathUtils.clamp(scaleRef * 3.2, 0.5, 2.2);
  joints.forEach((j, i) => j.scale.setScalar(s * revealFactor(REVEAL_SEG(i), now)));

  // GLBモデルがある場合：手のひらの位置・向き・大きさに合わせて配置
  if (glbModel) {
    updateGlb();
    return;
  }

  BONES.forEach(([a, b], i) => {
    _v1.copy(smoothed[a]); _v2.copy(smoothed[b]);
    _mid.addVectors(_v1, _v2).multiplyScalar(0.5);
    _dir.subVectors(_v2, _v1);
    const len = _dir.length();
    const rf = revealFactor(Math.min(REVEAL_SEG(a), REVEAL_SEG(b)), now);
    bones[i].position.copy(_mid);
    bones[i].scale.set(s * rf, len * rf, s * rf);
    _q.setFromUnitVectors(_up, _dir.normalize());
    bones[i].setRotationFromQuaternion(_q);
  });

  // 結晶ネイル：第一関節→指先の方向へ伸ばす
  NAIL_SEGS.forEach(([a, b], i) => {
    _dir.subVectors(smoothed[b], smoothed[a]).normalize();
    nails[i].position.copy(smoothed[b]);
    const rf = revealFactor(0, now); // 爪は最初に現れる
    nails[i].scale.setScalar(s * rf);
    _q.setFromUnitVectors(_up, _dir);
    nails[i].setRotationFromQuaternion(_q);
  });
}

// ---------- Blender GLBモデルの読み込みとボーン追従 ----------
const MP_BONE_MAP = {
  thumb1R:[1,2], thumb2R:[2,3], thumb3R:[3,4],
  index1R:[5,6], index2R:[6,7], index3R:[7,8],
  middle1R:[9,10], middle2R:[10,11], middle3R:[11,12],
  ring1R:[13,14], ring2R:[14,15], ring3R:[15,16],
  pinky1R:[17,18], pinky2R:[18,19], pinky3R:[19,20],
};
const BONE_ORDER = Object.keys(MP_BONE_MAP);
let glbModel = null;
let glbMats = [];
let skeletonHelper = null;
let restPalmLength = 1;
let restWristLocal = new THREE.Vector3();
let restBasisInverse = new THREE.Quaternion();
const boneBindings = new Map();
const _basisX = new THREE.Vector3(), _basisY = new THREE.Vector3(), _basisZ = new THREE.Vector3();
const _basisMatrix = new THREE.Matrix4(), _desiredRootQ = new THREE.Quaternion();
const _parentQ = new THREE.Quaternion(), _desiredParentDir = new THREE.Vector3();
const _rawDeltaQ = new THREE.Quaternion(), _deltaQ = new THREE.Quaternion();
const _targetQ = new THREE.Quaternion(), _identityQ = new THREE.Quaternion();
const _wristOffset = new THREE.Vector3();

function localBonePosition(bone) {
  const position = new THREE.Vector3();
  bone.getWorldPosition(position);
  return glbModel.worldToLocal(position);
}

function initializeSkeleton() {
  const bonesByName = {};
  glbModel.traverse(object => { if (object.isBone) bonesByName[object.name] = object; });
  const required = ['wristR', 'handR', ...BONE_ORDER];
  const missing = required.filter(name => !bonesByName[name]);
  if (missing.length) throw new Error(`必要な骨がありません: ${missing.join(', ')}`);

  glbModel.updateMatrixWorld(true);
  const wrist = localBonePosition(bonesByName.handR);
  const index = localBonePosition(bonesByName.index1R);
  const middle = localBonePosition(bonesByName.middle1R);
  const pinky = localBonePosition(bonesByName.pinky1R);
  restWristLocal.copy(wrist);
  restPalmLength = Math.max(0.0001, wrist.distanceTo(middle));
  _basisX.subVectors(pinky, index).normalize();
  _basisZ.subVectors(middle, wrist).normalize();
  _basisY.crossVectors(_basisZ, _basisX).normalize();
  _basisX.crossVectors(_basisY, _basisZ).normalize();
  _basisMatrix.makeBasis(_basisX, _basisY, _basisZ);
  restBasisInverse.setFromRotationMatrix(_basisMatrix).invert();

  BONE_ORDER.forEach(name => {
    const bone = bonesByName[name];
    const restQuaternion = bone.quaternion.clone();
    const restDirectionParent = new THREE.Vector3(0, 1, 0)
      .applyQuaternion(restQuaternion).normalize();
    boneBindings.set(name, { bone, restQuaternion, restDirectionParent });
  });
  document.getElementById('bone-list').textContent = required.join(' · ');
}

function setProceduralVisible(visible) {
  joints.forEach(object => object.visible = visible);
  bones.forEach(object => object.visible = visible);
  nails.forEach(object => object.visible = visible);
}

function applyDisplayMode() {
  const mode = displayMode.value;
  video.style.opacity = mode === 'model' ? '0' : '1';
  const showLandmarks = mode === 'landmarks';
  const showModel = ['overlay', 'model', 'skeleton'].includes(mode);
  setProceduralVisible(showLandmarks || (!glbModel && showModel));
  if (glbModel) glbModel.visible = showModel;
  if (skeletonHelper) skeletonHelper.visible = mode === 'skeleton';
}

new THREE.GLTFLoader().load('rigged_hand.glb', gltf => {
  try {
    glbModel = gltf.scene;
    handGroup.add(glbModel);
    glbModel.traverse(object => {
      if (object.isMesh && object.material) {
        const materials = Array.isArray(object.material) ? object.material : [object.material];
        materials.forEach(material => {
          material.transparent = true;
          if (material.name && material.name.includes('Nail')) {
            material.color.set(0xf3b8d4);
            material.emissive.set(0xff7fb5);
            if ('transmission' in material) material.transmission = 0;
            material.userData.isNail = true;
          }
          glbMats.push(material);
        });
      }
    });
    initializeSkeleton();
    skeletonHelper = new THREE.SkeletonHelper(glbModel);
    skeletonHelper.material.depthTest = false;
    skeletonHelper.material.transparent = true;
    skeletonHelper.material.opacity = 0.8;
    scene.add(skeletonHelper);
    applySliders();
    applyDisplayMode();
    statusEl.textContent = 'リグ付きモデル読み込み完了';
  } catch (error) {
    console.error(error);
    statusEl.textContent = '骨構造を確認できません';
    document.getElementById('bone-list').textContent = error.message;
  }
}, progress => {
  if (progress.total) statusEl.textContent = `モデル読み込み ${Math.round(progress.loaded / progress.total * 100)}%`;
}, error => {
  console.error('GLB読み込み失敗', error);
  statusEl.textContent = 'GLB読み込み失敗（簡易モデルで継続）';
  document.getElementById('bone-list').textContent = 'rigged_hand.glb を読み込めませんでした';
  applyDisplayMode();
});

function updateGlb() {
  if (!glbModel || boneBindings.size !== BONE_ORDER.length) return;

  // 実写の手のひら座標系と、GLBのRest Pose座標系との差分をモデル全体へ適用。
  _basisX.subVectors(smoothed[17], smoothed[5]).normalize();
  _basisZ.subVectors(smoothed[9], smoothed[0]).normalize();
  _basisY.crossVectors(_basisZ, _basisX).normalize();
  _basisX.crossVectors(_basisY, _basisZ).normalize();
  _basisMatrix.makeBasis(_basisX, _basisY, _basisZ);
  _desiredRootQ.setFromRotationMatrix(_basisMatrix).multiply(restBasisInverse);
  glbModel.quaternion.copy(_desiredRootQ);

  const reveal = 0.05 + revealFactor(0, performance.now()) * 0.95;
  const modelScale = modelScaleControl.value / 100;
  const scale = smoothed[0].distanceTo(smoothed[9]) / restPalmLength * modelScale * reveal;
  glbModel.scale.setScalar(scale);
  _wristOffset.copy(restWristLocal).multiplyScalar(scale).applyQuaternion(glbModel.quaternion);
  glbModel.position.copy(smoothed[0]).sub(_wristOffset);
  glbModel.position.x += Number(offsetXControl.value) / 100;
  glbModel.position.y += Number(offsetYControl.value) / 100;
  glbModel.position.z += Number(depthControl.value) / 500;
  glbModel.updateMatrixWorld(true);

  const response = 1 - (smoothingControl.value / 100) * 0.82;
  const curlStrength = curlControl.value / 100;
  BONE_ORDER.forEach(name => {
    const binding = boneBindings.get(name);
    const [start, end] = MP_BONE_MAP[name];
    _dir.subVectors(smoothed[end], smoothed[start]);
    if (_dir.lengthSq() < 1e-8) return;
    _dir.normalize();
    binding.bone.parent.getWorldQuaternion(_parentQ).invert();
    _desiredParentDir.copy(_dir).applyQuaternion(_parentQ).normalize();
    _rawDeltaQ.setFromUnitVectors(binding.restDirectionParent, _desiredParentDir);
    const angle = 2 * Math.acos(THREE.MathUtils.clamp(Math.abs(_rawDeltaQ.w), -1, 1));
    const maxAngle = name.startsWith('thumb') ? Math.PI * 0.62 : Math.PI * 0.72;
    const strength = angle > 1e-5 ? Math.min(curlStrength, maxAngle / angle) : 1;
    _deltaQ.copy(_identityQ).slerp(_rawDeltaQ, strength);
    _targetQ.copy(_deltaQ).multiply(binding.restQuaternion);
    if (binding.bone.quaternion.dot(_targetQ) < 0) _targetQ.set(-_targetQ.x, -_targetQ.y, -_targetQ.z, -_targetQ.w);
    binding.bone.quaternion.slerp(_targetQ, response);
    binding.bone.updateMatrixWorld(true);
  });
}

// ---------- スライダー ----------
const sFusion = document.getElementById('s-fusion');
const sTrans = document.getElementById('s-trans');
const sGlow = document.getElementById('s-glow');

function applySliders() {
  const fusion = sFusion.value / 100;
  const trans = sTrans.value / 100;
  const glow = sGlow.value / 100;
  const modelOpacity = modelOpacityControl.value / 100;

  // 融合比率：0=実写の手だけ / 1=完全にアートの世界（実写が闇に沈む）
  crystalMat.opacity = 0.15 + fusion * 0.85;
  veil.style.opacity = Math.max(0, (fusion - 0.55) / 0.45) * 0.92;
  document.body.classList.toggle('art-mode', fusion > 0.55);

  const preset = ART_PRESETS[activeArt];
  crystalMat.transmission = preset.transmission * trans;
  crystalMat.roughness = THREE.MathUtils.clamp(preset.roughness + (1 - trans) * 0.18, 0.04, 0.92);
  crystalMat.emissiveIntensity = glow * 2.2;
  nailMat.opacity = 0.3 + fusion * 0.7;
  nailMat.transmission = preset.transmission * (0.45 + trans * 0.55);
  nailMat.emissiveIntensity = 0.2 + glow * 2.6;
  rim.intensity = 0.4 + glow * 2.0;
  // GLBモデルのマテリアルにも反映
  glbMats.forEach(m => {
    m.opacity = (0.15 + fusion * 0.85) * modelOpacity;
    // 環境マップなしだと透過は暗く沈むため、透過を抑えて発光で補う
    if ('transmission' in m && !m.userData.isNail) m.transmission = preset.transmission * trans * 0.7;
    if ('roughness' in m) m.roughness = THREE.MathUtils.clamp(preset.roughness + (1 - trans) * 0.12, 0.04, 0.92);
    if (m.emissive) m.emissiveIntensity = (m.userData.isNail ? 0.8 : 0.5) + glow * 2.5;
  });
  if (glbModel) { key.intensity = 2.0; ambient.intensity = 1.3; }

  document.getElementById('o-fusion').textContent = sFusion.value + '%';
  document.getElementById('o-trans').textContent = sTrans.value + '%';
  document.getElementById('o-glow').textContent = sGlow.value + '%';
  document.getElementById('o-model-scale').textContent = modelScaleControl.value + '%';
  document.getElementById('o-model-opacity').textContent = modelOpacityControl.value + '%';
  document.getElementById('o-offset-x').textContent = offsetXControl.value;
  document.getElementById('o-offset-y').textContent = offsetYControl.value;
  document.getElementById('o-depth').textContent = depthControl.value;
  document.getElementById('o-smoothing').textContent = smoothingControl.value + '%';
  document.getElementById('o-curl').textContent = curlControl.value + '%';
}
[sFusion, sTrans, sGlow, modelScaleControl, modelOpacityControl,
 offsetXControl, offsetYControl, depthControl, smoothingControl, curlControl]
  .forEach(control => control.addEventListener('input', applySliders));
displayMode.addEventListener('change', applyDisplayMode);
applySliders();
selectArt('crystal');

// ---------- MediaPipe Hands ----------
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`,
});
hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6,
});

let lastSeen = 0;
hands.onResults(results => {
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    updateHand(results.multiHandLandmarks[0]);
    handGroup.visible = true;
    lastSeen = performance.now();
    const handedness = results.multiHandedness?.[0]?.label;
    statusEl.textContent = handedness ? `トラッキング中・${handedness === 'Left' ? '左' : '右'}手` : 'トラッキング中';
  } else if (performance.now() - lastSeen > 600) {
    handGroup.visible = false;
    hasPose = false;
    statusEl.textContent = '手をかざしてください';
  }
});

// ---------- 起動 ----------
let processing = false;
async function loop() {
  if (video.readyState >= 2 && !processing) {
    processing = true;
    try { await hands.send({ image: video }); } catch (e) { /* 初期化中は無視 */ }
    processing = false;
  }
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

// ---------- カメラなしデモ（合成ハンドポーズ） ----------
const BASE_POSE = [
  [0.50,0.85],[0.42,0.78],[0.36,0.70],[0.32,0.63],[0.29,0.57],
  [0.44,0.60],[0.43,0.50],[0.42,0.43],[0.41,0.37],
  [0.50,0.58],[0.50,0.47],[0.50,0.39],[0.50,0.32],
  [0.56,0.60],[0.57,0.49],[0.575,0.42],[0.58,0.36],
  [0.62,0.64],[0.64,0.55],[0.65,0.49],[0.66,0.44],
];
function syntheticLandmarks(t) {
  const sway = Math.sin(t * 0.8) * 0.04;
  const breathe = Math.sin(t * 1.7) * 0.5 + 0.5; // 0..1 指の曲げ
  return BASE_POSE.map(([x, y], i) => {
    // 指先ほど曲げの影響を大きく（wristからの距離で近似）
    const seg = i === 0 ? 0 : ((i - 1) % 4) + 1;
    const curl = i >= 5 ? breathe * seg * 0.012 : 0;
    return { x: 1 - (x + sway), y: y + curl, z: -0.05 };
  });
}
function startDemoMode() {
  document.getElementById('start-overlay').remove();
  statusEl.textContent = 'デモ再生中（カメラなし）';
  document.getElementById('hint').textContent = 'デモ再生モード：合成した手のポーズで動作を確認しています';
  (function demoLoop() {
    updateHand(syntheticLandmarks(performance.now() / 1000));
    handGroup.visible = true;
    renderer.render(scene, camera);
    requestAnimationFrame(demoLoop);
  })();
}
document.getElementById('demo-btn').addEventListener('click', startDemoMode);

let facing = 'user';   // 'user'=内側 / 'environment'=外側
let mirrored = true;   // 内側カメラは鏡像表示

function setMirrored(value, syncControl = true) {
  mirrored = value;
  video.style.transform = mirrored ? 'scaleX(-1)' : 'none';
  if (syncControl) mirrorToggle.checked = mirrored;
  hasPose = false;
}

mirrorToggle.addEventListener('change', () => setMirrored(mirrorToggle.checked, false));

async function startCamera(mode) {
  if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: mode === 'environment' ? { ideal: 'environment' } : 'user',
             width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false,
  });
  video.srcObject = stream;
  await video.play();
  facing = mode;
  // 実際に得られたカメラの向きで鏡像を判定（背面指定でも前面が来る端末対策）
  const settings = stream.getVideoTracks()[0].getSettings();
  setMirrored((settings.facingMode || 'user') !== 'environment');
}

document.getElementById('flip-btn').addEventListener('click', async () => {
  statusEl.textContent = 'カメラ切替中…';
  try {
    await startCamera(facing === 'user' ? 'environment' : 'user');
    statusEl.textContent = mirrored ? '内側カメラ' : '外側カメラ';
  } catch (e) {
    statusEl.textContent = 'このカメラは使用できません';
  }
});

document.getElementById('start-btn').addEventListener('click', async () => {
  statusEl.textContent = 'カメラ起動中…';
  try {
    // 外側カメラを優先（手を映すアプリなので）。無い端末は内側へ
    try { await startCamera('environment'); }
    catch (_) { await startCamera('user'); }
    document.getElementById('start-overlay').remove();
    document.getElementById('flip-btn').style.display = '';
    statusEl.textContent = 'モデル読み込み中…';
    loop();
  } catch (e) {
    statusEl.textContent = 'カメラを使用できません';
    alert('カメラの使用が許可されませんでした。ブラウザの設定を確認してください。\n' + e.message);
  }
});
